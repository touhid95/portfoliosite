<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Photography — m.k.touhid.</title>
    <link rel="stylesheet" href="chat-widget.css" />
    <link rel="icon" type="image/png" href="nav_photo_png/1.png" />
    <style>
        .brutalist-img-container {
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .brutalist-img-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        .brutalist-img-container:hover img {
            transform: scale(1.05);
        }
    </style>
</head>

<body
    style="font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 0; background-color: #fff; color: #000; overflow-x: hidden;">

    <!-- NAV -->
    <div
        style="display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid #e0e0e0;">
        <a href="index.html"
            style="font-weight: 900; font-size: 20px; text-decoration: none; color: #000; letter-spacing: -1px;">m.k.touhid.</a>
        <div style="display: flex; gap: 30px;">
            <a href="index.html"
                style="font-size: 12px; text-decoration: none; color: #333; text-transform: uppercase; letter-spacing: 1px;">Home</a>
            <a href="about.html"
                style="font-size: 12px; text-decoration: none; color: #333; text-transform: uppercase; letter-spacing: 1px;">About</a>
            <a href="projects.html"
                style="font-size: 12px; text-decoration: none; color: #333; text-transform: uppercase; letter-spacing: 1px;">Projects</a>
            <a href="gallery.html"
                style="font-size: 12px; text-decoration: none; color: #000; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid #ff4d36; padding-bottom: 2px;">Gallery</a>
            <a href="contact.html"
                style="font-size: 12px; text-decoration: none; color: #333; text-transform: uppercase; letter-spacing: 1px;">Contact</a>
        </div>
    </div>

    <!-- HERO: Massive Typography Block -->
    <div style="padding: 60px 40px 0 40px; position: relative;">

        <!-- Top-right metadata tag -->
        <div style="position: absolute; top: 60px; right: 50px; text-align: right;">
            <div style="display: flex; gap: 5px; justify-content: flex-end; margin-bottom: 8px;">
                <span
                    style="width: 5px; height: 5px; background: #000; border-radius: 50%; display: inline-block;"></span>
                <span
                    style="width: 5px; height: 5px; background: #000; border-radius: 50%; display: inline-block;"></span>
                <span
                    style="width: 5px; height: 5px; background: #000; border-radius: 50%; display: inline-block;"></span>
            </div>
            <div
                style="font-size: 9px; font-family: monospace; text-transform: uppercase; letter-spacing: 1.5px; color: #555; line-height: 1.8;">
                LAB EXPERIENCE<br>
                FUTURE FORWARD AESTHETICS
            </div>
        </div>

        <!-- GIANT TITLE TEXT -->
        <h1
            style="font-family: 'Arial Black', Impact, sans-serif; font-size: clamp(60px, 11.5vw, 150px); font-weight: 900; letter-spacing: -5px; line-height: 0.85; margin: 0; color: #000; text-transform: uppercase;">
            CREATIVE</h1>

        <div style="display: flex; align-items: center; gap: clamp(10px, 2vw, 25px);">
            <div style="width: clamp(50px, 7vw, 100px); height: clamp(8px, 1.2vw, 16px); background: #000; flex-shrink: 0; margin-top: 5px;"></div>
            <h1
                style="font-family: 'Arial Black', Impact, sans-serif; font-size: clamp(60px, 11.5vw, 150px); font-weight: 900; letter-spacing: -5px; line-height: 0.85; margin: 0; color: #ff4d36; text-transform: uppercase;">
                EXPLORATION</h1>
        </div>

        <h1
            style="font-family: 'Arial Black', Impact, sans-serif; font-size: clamp(48px, 9vw, 118px); font-weight: 900; letter-spacing: -4px; line-height: 0.85; margin: 0; color: #000; text-transform: uppercase;">
            EXPERIMENTATION</h1>
    </div>

    <!-- ═══ CMS-MANAGED GALLERY ═══ -->
    <div id="gallery-cms-container" style="min-height: 400px;">
        <!-- Loading state -->
        <div style="padding: 60px 40px; font-family: monospace; font-size: 12px; color: #777;">Loading photos&hellip;</div>
    </div>

    <!-- GALLERY FOOTER -->
    <div
        style="border-top: 2px solid #000; display: flex; justify-content: space-between; align-items: center; padding: 25px 40px;">
        <span id="gallery-count-label"
            style="font-size: 11px; font-family: monospace; color: #999; text-transform: uppercase; letter-spacing: 2px;">
            Works — 2026 Collection</span>
        <a href="index.html"
            style="font-size: 12px; font-weight: bold; text-decoration: none; color: #000; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid #ff4d36; padding-bottom: 3px;">Back
            to Portfolio ↖</a>
    </div>

<script>
(function() {
  var container = document.getElementById('gallery-cms-container');
  var countLabel = document.getElementById('gallery-count-label');

  // Helper to generate the 3-column brutalist block for exactly 6 photos
  function buildBrutalistBlock(photos, offset) {
    var p = photos; // Array of 6 items
    var getSrc = function(idx) { return p[idx] ? p[idx].url : ''; };
    var getCap = function(idx) { return p[idx] ? p[idx].caption || 'Photo ' + (offset + idx + 1) : ''; };

    return `
    <div style="padding: 60px 40px; display: flex; gap: 0;">
        <!-- Left Column -->
        <div style="flex: 1; display: flex; flex-direction: column;">
            <div style="display: flex; height: 280px;">
                <div style="width: 45%; background: #ff4d36;"></div>
                <div class="brutalist-img-container" style="width: 55%; background: #1a1a1a;">
                    <img src="${getSrc(0)}" loading="lazy" onerror="this.style.display='none'" />
                    <div style="position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; pointer-events: none;">
                        <span style="font-size: 10px; font-family: monospace; text-transform: uppercase; color: #fff; letter-spacing: 2px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); z-index: 2;">${getCap(0)}</span>
                    </div>
                </div>
            </div>
            <div class="brutalist-img-container" style="height: 240px; background: #d0d0d0;">
                <img src="${getSrc(1)}" loading="lazy" onerror="this.style.display='none'" />
                <div style="position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; pointer-events: none;">
                    <span style="font-size: 10px; font-family: monospace; text-transform: uppercase; color: #fff; letter-spacing: 2px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); z-index: 2;">${getCap(1)}</span>
                </div>
            </div>
        </div>

        <!-- Center Column -->
        <div style="flex: 1; display: flex; flex-direction: column; margin-top: 140px;">
            <div class="brutalist-img-container" style="height: 240px; background: #e0e0e0;">
                <img src="${getSrc(2)}" loading="lazy" onerror="this.style.display='none'" />
                <div style="position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; pointer-events: none;">
                    <span style="font-size: 10px; font-family: monospace; text-transform: uppercase; color: #fff; letter-spacing: 2px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); z-index: 2;">${getCap(2)}</span>
                </div>
            </div>
            <div class="brutalist-img-container" style="height: 240px; background: #111;">
                <img src="${getSrc(3)}" loading="lazy" onerror="this.style.display='none'" />
                <div style="position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; pointer-events: none;">
                    <span style="font-size: 10px; font-family: monospace; text-transform: uppercase; color: #fff; letter-spacing: 2px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); z-index: 2;">${getCap(3)}</span>
                </div>
            </div>
        </div>

        <!-- Right Column -->
        <div style="flex: 1; display: flex; flex-direction: column;">
            <div style="display: flex; height: 280px;">
                <div class="brutalist-img-container" style="width: 55%; background: #111; padding: 20px; box-sizing: border-box; align-items: flex-end;">
                    <img src="${getSrc(4)}" loading="lazy" onerror="this.style.display='none'" />
                    <div style="position: relative; z-index: 2;">
                        <span style="font-size: 10px; font-family: monospace; text-transform: uppercase; color: #fff; letter-spacing: 2px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);">${getCap(4)}</span>
                    </div>
                </div>
                <div style="width: 45%; background: #c8c8c8; display: flex; align-items: center; justify-content: center;">
                    <span style="font-size: 10px; font-family: monospace; text-transform: uppercase; color: #777; letter-spacing: 2px; writing-mode: vertical-rl;">GALLERY</span>
                </div>
            </div>
            <div class="brutalist-img-container" style="height: 240px; background: #b8b8b8;">
                <img src="${getSrc(5)}" loading="lazy" onerror="this.style.display='none'" />
                <div style="position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; pointer-events: none;">
                    <span style="font-size: 10px; font-family: monospace; text-transform: uppercase; color: #fff; letter-spacing: 2px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); z-index: 2;">${getCap(5)}</span>
                </div>
            </div>
        </div>
    </div>
    `;
  }

  // Helper to generate the flex row for remaining photos
  function buildFlexRow(photos, offset) {
    var html = '<div style="padding: 0 40px 60px; display: flex; gap: 15px; flex-wrap: wrap;">';
    var bgColors = ['#ff4d36', '#1a1a1a', '#d5d5d5', '#000'];
    var flexes = ['1', '2', '1', '1'];
    
    photos.forEach(function(p, i) {
      var bg = bgColors[i % 4];
      var flx = flexes[i % 4];
      var cap = p.caption || 'Photo ' + (offset + i + 1);

      html += `
        <div class="brutalist-img-container" style="flex: ${flx}; min-width: 150px; height: 200px; background: ${bg}; border-radius: 8px; padding: 15px; box-sizing: border-box; align-items: flex-end;">
            <img src="${p.url}" loading="lazy" onerror="this.style.display='none'" style="border-radius: 8px;" />
            <span style="font-size: 10px; font-family: monospace; color: #fff; text-transform: uppercase; letter-spacing: 1px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); position: relative; z-index: 2;">${cap}</span>
        </div>
      `;
    });
    html += '</div>';
    return html;
  }

  fetch('/api/gallery/list')
    .then(function(r) { return r.json(); })
    .then(function(photos) {
      if (!photos) photos = [];
      countLabel.textContent = photos.length + ' Works — 2026 Collection';
      
      if (!photos.length) {
        container.innerHTML = '<div style="padding: 60px 40px; font-family: monospace; font-size: 12px; color: #777;">No photos available in the gallery.</div>';
        return;
      }

      var html = '';
      for (var i = 0; i < photos.length; i += 6) {
        var chunk = photos.slice(i, i + 6);
        if (chunk.length === 6) {
          html += buildBrutalistBlock(chunk, i);
        } else {
          html += buildFlexRow(chunk, i);
        }
      }

      container.innerHTML = html;
    })
    .catch(function(e) {
      console.error(e);
      container.innerHTML = '<div style="padding: 60px 40px; font-family: monospace; font-size: 12px; color: #777;">Failed to load photos.</div>';
    });
})();
</script>

<script src="chat-widget.js"></script>
</body>
</html>
